<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京二手房数据监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            color: #888;
            font-size: 14px;
        }
        .update-time {
            color: #666;
            font-size: 12px;
            margin-top: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent1), var(--accent2));
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
        }
        .card-stats {
            display: flex;
            gap: 12px;
            font-size: 12px;
            flex-wrap: wrap;
        }
        .card-stats span {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .card-total {
            background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(123,44,191,0.15));
            --accent1: #00d4ff;
            --accent2: #7b2cbf;
        }
        .card-zhongguancun {
            background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(255,170,0,0.15));
            --accent1: #ff6b9d;
            --accent2: #ffaa00;
        }
        .card-shangdi {
            background: linear-gradient(135deg, rgba(255,87,87,0.15), rgba(255,170,0,0.15));
            --accent1: #ff5757;
            --accent2: #ffaa00;
        }
        .card-haidian {
            background: linear-gradient(135deg, rgba(130,87,255,0.15), rgba(0,212,255,0.15));
            --accent1: #8257ff;
            --accent2: #00d4ff;
        }
        .footer {
            text-align: center;
            color: #555;
            font-size: 12px;
            margin-top: 40px;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .card { padding: 20px; }
            .card-stats { gap: 8px; }
            .card-stats span { font-size: 11px; padding: 3px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>北京二手房数据监控</h1>
            <p class="subtitle">实时追踪成交动态 · 数据来源：北京市住建委</p>
            <p class="update-time">更新时间：2026年3月22日</p>
        </div>

        <div class="grid">
            <a href="beijing_house_data.html" class="card card-total">
                <div class="card-icon">🇨🇳</div>
                <div class="card-title">北京市二手房</div>
                <div class="card-desc">全市每日网签成交数据</div>
                <div class="card-stats">
                    <span>502套/日均</span>
                    <span>5.73万/㎡</span>
                </div>
            </a>
            <a href="zhongguancun_house_data.html" class="card card-zhongguancun">
                <div class="card-icon">🏛️</div>
                <div class="card-title">中关村学区</div>
                <div class="card-desc">顶尖学区 · 传统顶流</div>
                <div class="card-stats">
                    <span>143套/月</span>
                    <span>8.8万/㎡</span>
                    <span>748万/套</span>
                </div>
            </a>
            <a href="shangdi_house_data.html" class="card card-shangdi">
                <div class="card-icon">🔥</div>
                <div class="card-title">上地学区</div>
                <div class="card-desc">阳光招生后崛起 · 最火学区</div>
                <div class="card-stats">
                    <span>50套/月</span>
                    <span>7.5万/㎡</span>
                    <span>639万/套</span>
                </div>
            </a>
            <a href="haidian_house_data.html" class="card card-haidian">
                <div class="card-icon">🌟</div>
                <div class="card-title">海淀学区</div>
                <div class="card-desc">教育资源集中 · 成交量大</div>
                <div class="card-stats">
                    <span>1,500套/月</span>
                    <span>8.3万/㎡</span>
                    <span>701万/套</span>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>数据来源：北京市住建委 · 央视财经 · 中指研究院</p>
            <p style="margin-top: 4px;">GitHub Pages 托管 · 持续更新</p>
        </div>
    </div>
</body>
</html>
