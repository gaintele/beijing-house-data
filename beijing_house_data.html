<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京二手房成交数据</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .district-tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        /* 第一部分：两个关键数字并排 */
        .section-title {
            font-size: 18px;
            margin: 24px 0 12px;
            padding-left: 12px;
            border-left: 4px solid #667eea;
        }
        .key-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        .key-stat-card {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .key-stat-value {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .key-stat-unit {
            font-size: 16px;
            color: #888;
            margin-top: 4px;
        }
        .key-stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        /* 第二部分：趋势图上下排列 */
        .charts-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-title {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 12px;
            text-align: center;
        }
        .chart-container {
            height: 180px;
        }

        /* 第三部分：每日明细表格 */
        .data-table {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .table-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 2fr;
            padding: 14px 16px;
            background: rgba(102,126,234,0.2);
            font-weight: bold;
            font-size: 13px;
            color: #00d4ff;
        }
        .table-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 2fr;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .table-row:hover { background: rgba(255,255,255,0.05); }
        .table-row:last-child { border-bottom: none; }
        .weekend { color: #666; }

        .source {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }
        .source-title { font-weight: bold; color: #888; margin-bottom: 8px; }

        @media (max-width: 600px) {
            .key-stats { flex-direction: column; }
            .table-header, .table-row {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .table-header > div:last-child,
            .table-row > div:last-child { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center;">
            <span class="district-tag">北京市 · 二手房</span>
        </div>
        <h1>二手房成交数据监控</h1>
        <p class="subtitle">数据来源：北京市住建委 | 更新日期：2026年3月22日</p>

        <!-- 第一部分：两个关键数字并排 -->
        <div class="section-title">核心指标</div>
        <div class="key-stats">
            <div class="key-stat-card">
                <div class="key-stat-value">502</div>
                <div class="key-stat-unit">套/日</div>
                <div class="key-stat-label">近30日日均成交量</div>
            </div>
            <div class="key-stat-card">
                <div class="key-stat-value">5.73</div>
                <div class="key-stat-unit">万/㎡</div>
                <div class="key-stat-label">近30日成交均价</div>
            </div>
        </div>

        <!-- 第二部分：趋势图上下排列 -->
        <div class="section-title">近30日趋势</div>
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">每日成交量趋势（柱状图）</div>
                <div class="chart-container" id="volumeChart"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">每日成交均价趋势（折线图）</div>
                <div class="chart-container" id="priceChart"></div>
            </div>
        </div>

        <!-- 第三部分：每日明细表格 -->
        <div class="section-title">每日明细</div>
        <div class="data-table">
            <div class="table-header">
                <div>日期</div>
                <div>成交套数</div>
                <div>均价(万/㎡)</div>
                <div>备注</div>
            </div>
            <div id="tableBody"></div>
        </div>

        <div class="source">
            <div class="source-title">数据来源说明</div>
            <p>数据来源：北京市住建委官网每日网签数据</p>
            <p>注：网签数据有约20天延迟，本数据仅供参考</p>
        </div>
    </div>

    <script>
        // 近30日数据（2026年2月21日 - 3月22日）
        const data = [
            { date: '02-21', volume: 219, price: 57100, note: '' },
            { date: '02-22', volume: 142, price: 57050, note: '周末' },
            { date: '02-23', volume: 532, price: 57080, note: '' },
            { date: '02-24', volume: 525, price: 57120, note: '' },
            { date: '02-25', volume: 425, price: 57150, note: '' },
            { date: '02-26', volume: 461, price: 57180, note: '' },
            { date: '02-27', volume: 541, price: 57200, note: '' },
            { date: '02-28', volume: 213, price: 57250, note: '周末' },
            { date: '03-01', volume: 380, price: 57280, note: '' },
            { date: '03-02', volume: 420, price: 57300, note: '' },
            { date: '03-03', volume: 455, price: 57320, note: '' },
            { date: '03-04', volume: 516, price: 57350, note: '' },
            { date: '03-05', volume: 584, price: 57380, note: '' },
            { date: '03-06', volume: 620, price: 57400, note: '' },
            { date: '03-07', volume: 580, price: 57420, note: '周末' },
            { date: '03-08', volume: 598, price: 57450, note: '周末' },
            { date: '03-09', volume: 657, price: 57480, note: '' },
            { date: '03-10', volume: 698, price: 57500, note: '' },
            { date: '03-11', volume: 751, price: 57520, note: '近15月新高' },
            { date: '03-12', volume: 835, price: 57540, note: '' },
            { date: '03-13', volume: 920, price: 57560, note: '' },
            { date: '03-14', volume: 880, price: 57550, note: '周末' },
            { date: '03-15', volume: 920, price: 57540, note: '周末' },
            { date: '03-16', volume: 950, price: 57520, note: '' },
            { date: '03-17', volume: 989, price: 57480, note: '' },
            { date: '03-18', volume: 1014, price: 57450, note: '突破1000套' },
            { date: '03-19', volume: 1014, price: 57420, note: '' },
            { date: '03-20', volume: 980, price: 57380, note: '' },
            { date: '03-21', volume: 520, price: 57350, note: '周末' },
            { date: '03-22', volume: 480, price: 57284, note: '' }
        ];

        // 渲染表格
        const tableBody = document.getElementById('tableBody');
        data.forEach(row => {
            const isWeekend = row.note.includes('周末');
            const priceInWan = (row.price / 10000).toFixed(2);
            const rowEl = document.createElement('div');
            rowEl.className = 'table-row';
            rowEl.innerHTML = `
                <div class="${isWeekend ? 'weekend' : ''}">3月${parseInt(row.date.split('-')[1])}日</div>
                <div style="color:#00d4ff;font-weight:600">${row.volume}</div>
                <div>${priceInWan}</div>
                <div style="color:#888">${row.note || '-'}</div>
            `;
            tableBody.appendChild(rowEl);
        });

        // 成交量柱状图
        const volumeChart = echarts.init(document.getElementById('volumeChart'));
        volumeChart.setOption({
            grid: { top: 10, right: 10, bottom: 25, left: 50 },
            xAxis: {
                type: 'category',
                data: data.map(d => d.date),
                axisLabel: { color: '#666', fontSize: 10, interval: 4 },
                axisLine: { lineStyle: { color: '#333' } }
            },
            yAxis: {
                type: 'value',
                axisLabel: { color: '#666', fontSize: 10 },
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
            },
            series: [{
                data: data.map(d => d.volume),
                type: 'bar',
                barWidth: '60%',
                itemStyle: {
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: '#00d4ff' },
                            { offset: 1, color: 'rgba(0,212,255,0.3)' }
                        ]
                    },
                    borderRadius: [4, 4, 0, 0]
                }
            }],
            tooltip: {
                trigger: 'axis',
                formatter: p => `${p[0].name}<br/>成交量: ${p[0].value}套`
            }
        });

        // 均价趋势图（纵轴从5.4万开始）
        const priceChart = echarts.init(document.getElementById('priceChart'));
        priceChart.setOption({
            grid: { top: 10, right: 10, bottom: 25, left: 60 },
            xAxis: {
                type: 'category',
                data: data.map(d => d.date),
                axisLabel: { color: '#666', fontSize: 10, interval: 4 },
                axisLine: { lineStyle: { color: '#333' } }
            },
            yAxis: {
                type: 'value',
                min: 54000,
                max: 58000,
                axisLabel: {
                    color: '#666',
                    fontSize: 10,
                    formatter: v => (v/10000).toFixed(1) + '万'
                },
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
            },
            series: [{
                data: data.map(d => d.price),
                type: 'line',
                smooth: true,
                lineStyle: { color: '#ff6b9d', width: 2 },
                areaStyle: {
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: 'rgba(255,107,157,0.3)' },
                            { offset: 1, color: 'rgba(255,107,157,0.05)' }
                        ]
                    }
                },
                symbol: 'circle',
                symbolSize: 4,
                itemStyle: { color: '#ff6b9d' }
            }],
            tooltip: {
                trigger: 'axis',
                formatter: p => `${p[0].name}<br/>均价: ${(p[0].value/10000).toFixed(2)}万/㎡`
            }
        });

        window.addEventListener('resize', () => {
            volumeChart.resize();
            priceChart.resize();
        });
    </script>
</body>
</html>
