<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京二手房成交数据</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .district-tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        /* 第一部分：两个关键数字并排 */
        .section-title {
            font-size: 18px;
            margin: 24px 0 12px;
            padding-left: 12px;
            border-left: 4px solid #667eea;
        }
        .key-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .key-stat-card {
            flex: 1;
            max-width: calc(50% - 6px);
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px 8px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .key-stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .key-stat-unit {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }
        .key-stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }

        /* 第二部分：趋势图上下排列 */
        .charts-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-title {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 12px;
            text-align: center;
        }
        .chart-container {
            height: 180px;
        }

        /* 第三部分：每日明细表格 */
        .data-table {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .table-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 2fr;
            padding: 14px 16px;
            background: rgba(102,126,234,0.2);
            font-weight: bold;
            font-size: 13px;
            color: #00d4ff;
        }
        .table-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 2fr;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .table-row:hover { background: rgba(255,255,255,0.05); }
        .table-row:last-child { border-bottom: none; }
        .weekend { color: #666; }

        .source {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }
        .source-title { font-weight: bold; color: #888; margin-bottom: 8px; }

        /* 手机适配：保持并排显示 */
        @media (max-width: 500px) {
            .key-stat-card { 
                max-width: calc(50% - 6px);
                padding: 12px 6px;
            }
            .key-stat-value { font-size: 24px; }
            .key-stat-unit { font-size: 12px; }
            .key-stat-label { font-size: 11px; }
            .table-header, .table-row {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .table-header > div:last-child,
            .table-row > div:last-child { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center;">

        </div>
        <h1>二手房成交数据监控</h1>

        <!-- 第二部分：近一年趋势（52周） -->

            <div class="chart-card">

        </div>

        <!-- 第四部分：每周明细表格 -->

            </div>

        </div>

                trigger: 'axis',
                formatter: p => `${p[0].name}<br/>2026年: ${(p[0].value/10000).toFixed(2)}万/㎡<br/>2025年: ${p[1] ? (p[1].value/10000).toFixed(2) : '-'}万/㎡`
            },
            legend: {
                show: true,
                bottom: 0,
                textStyle: { color: '#888', fontSize: 10 },
                itemWidth: 12,
                itemHeight: 8
            }
        });
    </script>
</body>
</html>
